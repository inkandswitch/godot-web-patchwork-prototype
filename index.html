<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
		<meta name="theme-color" content="#202531">
		<link rel="icon" type="image/png" href="favicon.png">
		<title>Patchwork Viewer</title>
		<style>
body {
	margin: 0;
	background: #333b4f;
	overflow: hidden;
	touch-action: none;
	font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
}

#loading {
	position: fixed;
	inset: 0;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	color: #e0e0e0;
	gap: 1rem;
	z-index: 10;
}

#loading img {
	width: auto;
	height: auto;
	max-width: min(85%, 50vh);
	max-height: 180px;
	margin-bottom: 1rem;
}

#status-text {
	font-size: 1.1rem;
}

#error-text {
	color: #ff6b6b;
	font-size: 1.1rem;
	max-width: 30rem;
	text-align: left;
	line-height: 1.6;
	background: rgba(255, 107, 107, 0.1);
	border: 1px solid rgba(255, 107, 107, 0.25);
	border-radius: 0.5rem;
	padding: 1rem 1.5rem;
}

#error-text ul {
	margin: 0.5rem 0 0;
	padding-left: 1.25rem;
	font-size: 0.95rem;
	color: #e0e0e0;
}

#progress-bar {
	width: min(320px, 70vw);
	height: 6px;
	background: #262c3b;
	border-radius: 3px;
	overflow: hidden;
}

#progress-bar-inner {
	height: 100%;
	width: 0%;
	background: #699ce8;
	border-radius: 3px;
	transition: width 0.3s ease;
}

#progress-bar.indeterminate #progress-bar-inner {
	width: 30%;
	animation: indeterminate 1.2s ease-in-out infinite;
}

@keyframes indeterminate {
	0% { transform: translateX(-100%); }
	100% { transform: translateX(433%); }
}

canvas {
	display: block;
	width: 100vw;
	height: 100vh;
	opacity: 0;
}

canvas:focus {
	outline: none;
}
		</style>
	</head>
	<body>
		<div id="loading">
			<img src="logo.svg" alt="Godot Engine logo">
			<div id="progress-bar"><div id="progress-bar-inner"></div></div>
			<div id="status-text">Loading…</div>
			<div id="error-text" style="display: none;"></div>
		</div>
		<canvas id="canvas" tabindex="1"></canvas>
		<script src="godot.editor.js"></script>
		<script type="module" src="/src/index.ts"></script>
	</body>
</html>
